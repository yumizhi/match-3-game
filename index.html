<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>三消原型</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-layout">
      <section class="character-panel">
        <h1>角色面板</h1>
        <div id="characters" class="characters"></div>
      </section>

      <section class="board-panel">
        <div class="board-toolbar">
          <div class="toolbar-title">
            <h2>战斗棋盘</h2>
            <p id="difficulty-desc" class="difficulty-desc"></p>
          </div>
          <div class="toolbar-controls">
            <label for="difficulty-select">难度</label>
            <select id="difficulty-select" class="difficulty-select">
              <option value="easy">轻松</option>
              <option value="normal" selected>标准</option>
              <option value="hard">困难</option>
            </select>
            <button id="restart-button" class="restart-button" type="button">
              重新开始
            </button>
          </div>
        </div>

        <header class="score-panel">
          <div class="score-item">
            <span class="label">分数</span>
            <span id="score-value" class="value">0</span>
          </div>
          <div class="score-item">
            <span class="label">连击</span>
            <span id="combo-value" class="value">0</span>
          </div>
        </header>

        <div class="board-wrap">
          <div id="board" class="board" aria-label="三消棋盘"></div>
          <div id="score-pop-layer" class="score-pop-layer" aria-hidden="true"></div>
        </div>
        <p class="hint">点击两个相邻方块即可交换。能量满时角色会自动施放技能。</p>
      </section>
    </main>

    <script type="module" src="game.js"></script>
  </body>
</html>
