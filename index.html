<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>缤纷果园三消</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-candy bg-candy-a" aria-hidden="true"></div>
    <div class="bg-candy bg-candy-b" aria-hidden="true"></div>
    <div class="bg-candy bg-candy-c" aria-hidden="true"></div>

    <main class="game-layout">
      <section class="character-panel panel-card" aria-label="技能队伍">
        <div id="characters" class="characters"></div>
      </section>

      <section class="board-panel panel-card">
        <div class="board-top">
          <div class="board-toolbar">
            <div class="toolbar-control-stack">
              <div class="toolbar-controls toolbar-controls-primary">
                <label class="sr-only" for="mode-select">模式</label>
                <select
                  id="mode-select"
                  class="difficulty-select compact-select control-select"
                >
                  <option value="endless" selected>无限模式</option>
                  <option value="level">关卡模式</option>
                </select>
                <label class="sr-only" for="difficulty-select">难度</label>
                <select
                  id="difficulty-select"
                  class="difficulty-select compact-select control-select"
                >
                  <option value="easy">轻松</option>
                  <option value="normal" selected>标准</option>
                  <option value="hard">困难</option>
                </select>
                <button
                  id="restart-button"
                  class="restart-button control-button control-button-secondary"
                  type="button"
                >
                  再来一局
                </button>
                <button
                  id="next-level-button"
                  class="restart-button next-level-button control-button control-button-primary"
                  type="button"
                  hidden
                >
                  下一关
                </button>
              </div>
              <div class="toolbar-controls toolbar-controls-secondary">
                <button
                  id="tutorial-button"
                  class="restart-button utility-button control-button control-button-ghost"
                  type="button"
                >
                  玩法提示
                </button>
                <button
                  id="sound-button"
                  class="restart-button utility-button control-button control-button-ghost"
                  type="button"
                >
                  音效：开
                </button>
              </div>
            </div>
          </div>
        </div>

        <section class="board-dashboard" aria-label="对局信息">
          <header class="score-panel">
            <div class="score-item score-main">
              <span class="label">分数</span>
              <span id="score-value" class="value">0</span>
            </div>
            <div class="score-item">
              <span class="label">连击</span>
              <span id="combo-value" class="value">0</span>
            </div>
            <div class="score-item level-only">
              <span class="label">目标分</span>
              <span id="target-value" class="value">∞</span>
            </div>
            <div class="score-item level-only">
              <span class="label">剩余步数</span>
              <span id="moves-value" class="value">∞</span>
            </div>
            <div class="score-item level-only">
              <span class="label">关卡</span>
              <span id="level-value" class="value">-</span>
            </div>
          </header>

          <div class="board-status-stack">
            <div class="goal-progress level-only" aria-live="polite">
              <div class="goal-progress-track">
                <div id="goal-progress-fill" class="goal-progress-fill"></div>
              </div>
              <span id="goal-progress-text" class="goal-progress-text">关卡进度</span>
            </div>

            <p id="mode-status" class="mode-status"></p>
          </div>
        </section>

        <section class="board-stage" aria-label="棋盘区域">
          <div id="combo-banner" class="combo-banner" aria-hidden="true"></div>
          <div class="board-wrap">
            <div class="board-frame" aria-hidden="true"></div>
            <div id="board" class="board" aria-label="三消棋盘"></div>
            <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
            <div id="score-pop-layer" class="score-pop-layer" aria-hidden="true"></div>
          </div>
        </section>
        <p class="hint">交换相邻水果，凑出 3 连就能消除。</p>
      </section>
    </main>

    <div
      id="tutorial-overlay"
      class="tutorial-overlay hidden"
      aria-hidden="true"
      role="dialog"
      aria-label="新手引导"
    >
      <div class="tutorial-card">
        <p class="tutorial-tag">新手引导</p>
        <h3>快速上手</h3>
        <p class="tutorial-intro">先玩一手，边玩边会。</p>
        <ol class="tutorial-list">
          <li>点两个相邻水果进行交换，连成 3 个就会消除。</li>
          <li>同色消除会给对应角色充能，满能量会自动放技能。</li>
          <li>关卡模式里，在步数耗尽前拿下目标分。</li>
          <li>无可用交换时会自动洗牌，继续开局。</li>
        </ol>
        <div class="tutorial-actions">
          <label class="tutorial-checkbox">
            <input id="tutorial-hide-toggle" type="checkbox" />
            下次不自动弹出
          </label>
          <button
            id="tutorial-close-button"
            class="restart-button control-button control-button-primary tutorial-confirm-button"
            type="button"
          >
            进入果园
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
